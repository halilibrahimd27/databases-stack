# =============================================================================
# CASSANDRA STACK - PRODUCTION OPTIMIZED
# Apache Cassandra 5.0 | Cassandra Web UI | Prometheus Exporter
# =============================================================================

networks:
  cassandra_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16

volumes:
  cassandra_data:

# =============================================================================
# LOGGING TEMPLATE - Prevents disk fill from logs
# =============================================================================
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ===========================================================================
  # APACHE CASSANDRA 5.0
  # ===========================================================================
  cassandra:
    image: cassandra:5.0
    container_name: cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"     # CQL native protocol
      - "7000:7000"     # Inter-node communication
      - "7199:7199"     # JMX monitoring
      - "9160:9160"     # Thrift (legacy)
    environment:
      # Cluster Configuration
      CASSANDRA_CLUSTER_NAME: "ProductionCluster"
      CASSANDRA_DC: "datacenter1"
      CASSANDRA_RACK: "rack1"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
      
      # Authentication & Authorization
      CASSANDRA_AUTHENTICATOR: "PasswordAuthenticator"
      CASSANDRA_AUTHORIZER: "CassandraAuthorizer"
      
      # Performance Tuning
      CASSANDRA_NUM_TOKENS: "256"
      HEAP_NEWSIZE: "256M"
      MAX_HEAP_SIZE: "1G"
      
      # Network
      CASSANDRA_LISTEN_ADDRESS: "auto"
      CASSANDRA_BROADCAST_ADDRESS: "auto"
      CASSANDRA_RPC_ADDRESS: "0.0.0.0"
      CASSANDRA_START_RPC: "true"
      
      JVM_EXTRA_OPTS: "-Dcassandra.allow_unsafe_aggressive_sstable_expiration=true -Djava.net.preferIPv4Stack=true -XX:+UseG1GC -XX:MaxGCPauseMillis=500"

      # Timezone
      TZ: "Europe/Istanbul"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      cassandra_network:
        ipv4_address: 172.29.0.10
    ulimits:
      memlock: -1
      nproc: 32768
      nofile:
        soft: 100000
        hard: 100000
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q '^UN'"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging: *default-logging

  # ===========================================================================
  # CASSANDRA WEB UI
  # https://github.com/orzhaha/cassandra-web
  # ===========================================================================
  cassandra-web:
    image: ipushc/cassandra-web:latest
    container_name: cassandra-web
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      CASSANDRA_HOST: "cassandra"
      CASSANDRA_PORT: "9042"
      CASSANDRA_USERNAME: "cassandra"
      CASSANDRA_PASSWORD: "${CASSANDRA_PASSWORD:?CASSANDRA_PASSWORD env var zorunlu}"
      HOST_PORT: ":80"
      READ_ONLY: "false"
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - cassandra_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging

  # ===========================================================================
  # CASSANDRA EXPORTER (Prometheus Metrics)
  # ===========================================================================
  cassandra-exporter:
    image: criteord/cassandra_exporter:latest
    container_name: cassandra-exporter
    restart: unless-stopped
    ports:
      - "9500:9500"
    environment:
      CASSANDRA_EXPORTER_CONFIG_host: "cassandra:7199"
      CASSANDRA_EXPORTER_CONFIG_listenPort: "9500"
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - cassandra_network
    deploy:
      resources:
        limits:
          memory: 128M
    logging: *default-logging

  # ===========================================================================
  # NGINX DASHBOARD
  # ===========================================================================
  nginx-dashboard:
    image: nginx:alpine
    container_name: cassandra-dashboard
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    networks:
      - cassandra_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
    logging: *default-logging